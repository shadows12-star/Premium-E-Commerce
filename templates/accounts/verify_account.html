<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Account</title>
</head>
<body style="margin:0; padding:20px; font-family:Arial, sans-serif; background:#f4f4f4;">
    <table width="100%" cellspacing="0" cellpadding="0">
        <tr>
            <td align="center">
                <table width="600" cellspacing="0" cellpadding="0" style="background:#ffffff; padding:40px; border-radius:8px;">
                    <tr>
                        <td style="font-size:16px; line-height:1.6; color:#333333;">
                            <p>Hi {{ user.first_name }},</p>

                            <p>Please click the button below to verify your account:</p>

                            <p style="text-align:center; margin:30px 0;">
                                <a href="{{ activation_url }}"
                                   style="background-color:#0d6efd; color:#ffffff; text-decoration:none; padding:12px 24px; border-radius:5px; display:inline-block; font-size:16px;">
                                    Verify Account
                                </a>
                            </p>

                            <p>Or copy and paste this link into your browser:</p>

                            <p style="word-break:break-all;">
                                <a href="{{ activation_url }}">{{ activation_url }}</a>
                            </p>

                            <p>If you did not create this account, you can ignore this email.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
